<!DOCTYPE html>
<html>
<head>
	<title>Lemons: A Platform</title>
</head>
<body>
<h1>Hey! New Lemon! Sign yourself Up!</h1>
<!-- form action attribute is by deafault refreshing the place -->
<form action="https://www.facebook.com" method="post">
	<label for="email">Email Address: </label><input id="email" type="text" required></input><br>
	<label for="password">Enter Password: </label><input id="password" type="password" required></input><br>
	<label for="password1">Confirm Password: </label><input id="password1" type="password" required="true"></input><br>
	<label for="date">Your Birthdate: </label><input id="date" type="date" placeholder="Birthdate" required="true"></input><br><label for="gender">Gender :</label><br>
	<input class="gender" type="radio" name="g">Male</input><br>
	<input class="gender" type="radio" name="g">Female</input><br>
	<input type="submit" value="Register"></input>
</form>
</body>
</html>
